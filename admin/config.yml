backend:
  name: git-gateway
  branch: main

media_folder: "media/uploads"
public_folder: "/media/uploads"

site_url: "/"
display_url: "/"
logo_url: "/media/logos/lwlat-logo.png"

publish_mode: simple
editor:
  preview: false

collections:
  - name: "events"
    label: "Events"
    files:
      - name: "eduhub_2027"
        label: "EduHub 2027"
        file: "events/eduhub-2027/event.json"
        format: "json"
        fields:
          - { label: "Event ID", name: "id", widget: "hidden", default: "eduhub-2027" }
          - { label: "Event title", name: "title", widget: "string" }
          - { label: "Short description", name: "subtitle", widget: "text" }
          - { label: "Full description", name: "description", widget: "text", required: false }
          - { label: "Date", name: "date", widget: "string", hint: "Example: Tuesday 5 January 2027" }
          - { label: "Time", name: "time", widget: "string" }
          - { label: "Venue", name: "venue", widget: "string" }
          - { label: "Capacity", name: "capacity", widget: "number", value_type: "int", min: 1 }
          - label: "Registration status"
            name: "status"
            widget: "select"
            options:
              - "Registration Open"
              - "Coming Soon"
              - "Fully Booked"
              - "Registration Closed"
          - label: "Status style"
            name: "statusClass"
            widget: "select"
            options:
              - { label: "Open", value: "open" }
              - { label: "Coming soon", value: "soon" }
              - { label: "Closed", value: "closed" }
          - { label: "Registration open", name: "registrationOpen", widget: "boolean", default: true }
          - { label: "Feature on homepage", name: "featured", widget: "boolean", default: true }

          - label: "Homepage card image"
            name: "cardImage"
            widget: "image"
            choose_url: true
            media_library:
              config:
                multiple: false

          - label: "Event hero image"
            name: "heroImage"
            widget: "image"
            choose_url: true
            media_library:
              config:
                multiple: false

          - label: "Event logo"
            name: "eventLogo"
            widget: "image"
            required: false
            choose_url: true
            media_library:
              config:
                multiple: false

          - label: "Lunch choices"
            name: "lunchOptions"
            widget: "list"
            field: { label: "Choice", name: "choice", widget: "string" }

          - label: "Session 1 choices"
            name: "session1"
            widget: "list"
            field: { label: "Session", name: "session", widget: "string" }

          - label: "Session 2 choices"
            name: "session2"
            widget: "list"
            field: { label: "Session", name: "session", widget: "string" }

  - name: "platform"
    label: "Platform settings"
    files:
      - name: "settings"
        label: "LwLAT Events settings"
        file: "data/settings.json"
        format: "json"
        fields:
          - { label: "Platform name", name: "platformName", widget: "string" }
          - { label: "Organisation", name: "organisation", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Primary colour", name: "primaryColour", widget: "color" }
          - { label: "Font", name: "font", widget: "string" }
          - { label: "Main logo", name: "logo", widget: "image" }

  - name: "media_library"
    label: "Media Library"
    folder: "media/library"
    create: true
    format: "json"
    slug: "{{slug}}"
    identifier_field: "title"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - "Event image"
          - "Logo"
          - "Speaker"
          - "Sponsor"
          - "Background"
      - { label: "Notes", name: "notes", widget: "text", required: false }

  - name: "training_manager"
    label: "Training Manager"
    files:
      - name: "training_opportunities"
        label: "EduHub Training Opportunities"
        file: "data/trainings.json"
        format: "json"
        fields:
          - label: "Training opportunities"
            name: "trainings"
            widget: "list"
            summary: "{{fields.title}} — {{fields.dateDisplay}}"
            fields:
              - { label: "Unique ID", name: "id", widget: "string", hint: "Lowercase, no spaces" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category", name: "category", widget: "select", options: ["Conference","Leadership","SEND","Safeguarding","Teaching & Learning","Business Support","Other"] }
              - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Date shown", name: "dateDisplay", widget: "string" }
              - { label: "Start time", name: "startTime", widget: "string" }
              - { label: "End time", name: "endTime", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Delivery", name: "delivery", widget: "select", options: ["In person","Online","Blended"] }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Audience", name: "audience", widget: "string" }
              - { label: "Presenter", name: "presenter", widget: "string", required: false }
              - { label: "Capacity", name: "capacity", widget: "number", required: false }
              - { label: "Booking deadline", name: "bookingDeadline", widget: "string", required: false }
              - { label: "Booking open", name: "bookingOpen", widget: "boolean", default: true }
              - { label: "Featured", name: "featured", widget: "boolean", default: false }
              - { label: "Logo or image", name: "image", widget: "image", required: false }
              - { label: "Extra question", name: "additionalQuestion", widget: "string", required: false }
