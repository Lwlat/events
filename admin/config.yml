backend:
  name: git-gateway
  branch: main

site_url: https://lwlat-events-training.netlify.app
display_url: https://lwlat-events-training.netlify.app
logo_url: /media/logos/lwlat-logo.png

media_folder: media/uploads
public_folder: /media/uploads

publish_mode: simple

editor:
  preview: false

collections:
  - name: training_manager
    label: Training Manager
    files:
      - name: training_opportunities
        label: EduHub Training Opportunities
        file: data/trainings.json
        format: json
        fields:
          - label: Training opportunities
            name: trainings
            widget: list
            summary: "{{fields.title}} — {{fields.dateDisplay}}"
            fields:
              - { label: Unique ID, name: id, widget: string, hint: "Use lowercase letters, numbers and hyphens only, for example safeguarding-update" }
              - { label: Title, name: title, widget: string }
              - label: Category
                name: category
                widget: select
                options:
                  - EduHub Conference
                  - Conference
                  - Leadership
                  - SEND
                  - Safeguarding
                  - Teaching & Learning
                  - Business Support
                  - Other
              - { label: Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { label: Date shown to visitors, name: dateDisplay, widget: string, hint: "Example: Tuesday 5 January 2027" }
              - { label: Start time, name: startTime, widget: string }
              - { label: End time, name: endTime, widget: string }
              - { label: Location, name: location, widget: string }
              - label: Delivery
                name: delivery
                widget: select
                options:
                  - In person
                  - Online
                  - Blended
              - { label: Description, name: description, widget: text }
              - { label: Audience, name: audience, widget: string }
              - { label: Presenter, name: presenter, widget: string, required: false }
              - { label: Capacity, name: capacity, widget: number, value_type: int, required: false }
              - { label: Booking deadline, name: bookingDeadline, widget: string, required: false }
              - { label: Booking open, name: bookingOpen, widget: boolean, default: true }
              - { label: Feature on homepage, name: featured, widget: boolean, default: false }
              - { label: Image, name: image, widget: image, required: false }
              - { label: Extra booking question, name: additionalQuestion, widget: string, required: false }

  - name: platform_settings
    label: Platform Settings
    files:
      - name: settings
        label: Main Settings
        file: data/settings.json
        format: json
        fields:
          - { label: Platform name, name: platformName, widget: string }
          - { label: Organisation, name: organisation, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Primary colour, name: primaryColour, widget: color }
