<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Event | LwLAT Events</title>
  <link rel="stylesheet" href="/app/css/styles.css">
  <script src="/app/js/event.js" defer></script>
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <header class="site-header">
    <a class="brand" href="/index.html">
      <img src="/media/logos/lwlat-logo.png" alt="Learning Without Limits Academy Trust">
    </a>
    <nav class="nav">
      <a href="/index.html#events">Events</a>
      <a href="/check-in/">Check-in</a>
      <a href="/admin/">Admin</a>
    </nav>
  </header>

  <main class="event-page">
    <section class="event-hero glass" id="event-hero">
      <span class="status" id="event-status">Loading</span>
      <h1 id="event-title">Loading event…</h1>
      <p id="event-subtitle"></p>
      <div class="event-meta">
        <article><strong>Date</strong><span id="event-date"></span></article>
        <article><strong>Time</strong><span id="event-time"></span></article>
        <article><strong>Venue</strong><span id="event-venue"></span></article>
      </div>
    </section>

    <section class="form-card glass" id="registration-card">
      <p class="eyebrow">Register</p>
      <h2>Book your place</h2>
      <form id="registration-form" method="POST" data-netlify="true" netlify-honeypot="bot-field">
        <input type="hidden" name="form-name" id="form-name">
        <input type="hidden" name="event_id" id="event-id">
        <input type="hidden" name="event_name" id="event-name">
        <p class="hidden"><label>Do not complete <input name="bot-field"></label></p>

        <fieldset>
          <legend>Your details</legend>
          <div class="form-grid">
            <label>First name <input name="first_name" required></label>
            <label>Surname <input name="surname" required></label>
          </div>
          <div class="form-grid">
            <label>Email <input name="email" type="email" required></label>
            <label>Telephone <input name="telephone"></label>
          </div>
          <div class="form-grid">
            <label>Organisation <input name="organisation" required></label>
            <label>Job title <input name="job_title"></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Event choices</legend>
          <label>Lunch choice
            <select name="lunch_choice" id="lunch-choice" required></select>
          </label>
          <div class="form-grid">
            <label>Session 1 <select name="session_1" id="session-1"></select></label>
            <label>Session 2 <select name="session_2" id="session-2"></select></label>
          </div>
        </fieldset>

        <fieldset>
          <legend>Access and notes</legend>
          <label>Dietary information <textarea name="dietary_info" rows="3"></textarea></label>
          <label>Accessibility requirements <textarea name="accessibility" rows="3"></textarea></label>
          <label>Additional notes <textarea name="notes" rows="3"></textarea></label>
        </fieldset>

        <button class="button primary" type="submit" id="register-button">Register</button>
      </form>
    </section>
  </main>

  <footer class="footer">
    <strong id="footer-event-title">LwLAT Events</strong>
    <span>Learning Without Limits Academy Trust</span>
  </footer>
</body>
</html>
