<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Training booking</title><link rel="stylesheet" href="app/css/styles.css"><script src="app/js/training-page.js" defer></script></head><body class="v2-inner-page">
<header class="v2-header"><a class="v2-brand" href="index.html"><img src="media/logos/lwlat-logo-colour.png" alt="Learning Without Limits Academy Trust"></a><nav class="v2-nav open"><a href="index.html">Home</a><a href="professional-learning.html">Professional Learning</a><a href="mailto:communications@lwlat.org.uk">Contact</a></nav></header>
<main class="training-booking-page"><a class="back-link" href="professional-learning.html">← Back to professional learning</a>
<section class="training-booking-hero"><div id="training-logo-wrap"></div><p class="training-label" id="training-category-label">Professional Learning</p><h1 id="training-title">Loading training…</h1><p id="training-description"></p><div class="training-detail-grid"><article><strong>Date</strong><span id="training-date"></span></article><article><strong>Time</strong><span id="training-time"></span></article><article><strong>Location</strong><span id="training-location"></span></article><article><strong>Audience</strong><span id="training-audience"></span></article></div></section>
<section class="training-booking-form-card" id="training-form-card"><p class="training-label">Book your place</p><h2>Registration form</h2>
<form name="eduhub-training-booking" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/booking-thank-you.html">
<input type="hidden" name="form-name" value="eduhub-training-booking"><input type="hidden" name="training_id" id="training-id-field"><input type="hidden" name="training_title" id="training-title-field"><input type="hidden" name="training_date" id="training-date-field"><p class="hidden"><label>Do not fill this in<input name="bot-field"></label></p>
<fieldset><legend>Your details</legend><div class="training-form-grid"><label>First name<input name="first_name" required></label><label>Surname<input name="surname" required></label></div><div class="training-form-grid"><label>Email address<input name="email" type="email" required></label><label>Telephone number<input name="telephone" type="tel"></label></div><div class="training-form-grid"><label>Organisation<input name="organisation" required></label><label>Job title<input name="job_title"></label></div></fieldset>
<fieldset><legend>Booking information</legend><label>Dietary requirements<textarea name="dietary_requirements" rows="3"></textarea></label><label>Accessibility requirements<textarea name="accessibility_requirements" rows="3"></textarea></label><label id="additional-question-label" hidden><span id="additional-question-text"></span><textarea name="additional_answer" rows="3"></textarea></label><label>Additional information<textarea name="additional_information" rows="3"></textarea></label></fieldset>
<label class="consent-row"><input type="checkbox" name="privacy_consent" required> I agree that my details may be used to manage this booking.</label><button class="training-submit" type="submit">Book your place</button>
</form></section></main></body></html>
